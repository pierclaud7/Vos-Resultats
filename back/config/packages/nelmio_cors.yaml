nelmio_cors:
    defaults:
        origin_regex: true
        allow_origin:
            - 'http://localhost:5173'   # Dev Vue.js (Vite)
            - 'http://localhost:3000'   # Alt dev port
        allow_credentials: true         # Indispensable pour les cookies de session
        allow_methods:
            - GET
            - POST
            - PUT
            - PATCH
            - DELETE
            - OPTIONS
        allow_headers:
            - Content-Type
            - Authorization
            - X-Requested-With
        max_age: 3600
    paths:
        '^/api/':
            allow_origin: ['http://localhost:5173', 'http://localhost:3000']
            allow_credentials: true
